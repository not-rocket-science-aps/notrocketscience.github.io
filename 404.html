<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>404 — Not Rocket Science™</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#1f2d12">
    <meta name="color-scheme" content="light dark">

    <style>
        @font-face {
            font-family: 'Instrument Sans';
            src: url('/fonts/InstrumentSans-Variable.woff2') format('woff2');
            font-weight: 400 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Serif';
            src: url('/fonts/InstrumentSerif-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <script src="/vendor/tailwind.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-nrs-green: #1f2d12;
            --color-nrs-sand: #ebe3d5;
            --color-nrs-brown: #2A1E06;
            --color-nrs-cream: #f5f0e8;
            --font-sans: 'Instrument Sans', system-ui, sans-serif;
            --font-serif: 'Instrument Serif', Georgia, serif;
        }
    </style>
    <style>
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
        :focus-visible {
            outline: 2px solid #1f2d12;
            outline-offset: 2px;
            border-radius: 2px;
        }
        @media (prefers-color-scheme: dark) {
            :focus-visible { outline-color: #ebe3d5; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float { animation: float 3s ease-in-out infinite; }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 9;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }
    </style>
</head>
<body class="bg-nrs-cream text-nrs-brown dark:bg-nrs-brown dark:text-nrs-sand font-sans antialiased min-h-screen flex items-center justify-center px-6">
    <main class="text-center" role="main">
        <p class="text-6xl float mb-6" aria-hidden="true">🧭</p>
        <h1 class="font-serif italic text-5xl sm:text-6xl text-nrs-green dark:text-nrs-sand">404</h1>
        <p class="mt-4 text-lg text-nrs-brown/60 dark:text-nrs-sand/50">This page doesn't exist. It's not rocket science&thinsp;&mdash;&thinsp;it's just missing.</p>
        <a href="/" class="inline-block mt-8 px-6 py-3 bg-nrs-green dark:bg-nrs-sand text-nrs-cream dark:text-nrs-brown rounded-lg font-medium hover:scale-[1.03] transition-transform">
            Back to home
        </a>
    </main>
</body>
</html>
