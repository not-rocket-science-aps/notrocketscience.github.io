<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>404 — Not Rocket Science™</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1f2d12">
    <meta name="color-scheme" content="light dark">

    <style>
        @font-face {
            font-family: 'Instrument Sans';
            src: url('/fonts/InstrumentSans-Variable.woff2') format('woff2');
            font-weight: 400 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Serif';
            src: url('/fonts/InstrumentSerif-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <script src="/vendor/tailwind.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-nrs-green: #1f2d12;
            --color-nrs-sand: #e2d6c0;
            --color-nrs-brown: #2A1E06;
            --font-sans: 'Instrument Sans', system-ui, sans-serif;
            --font-serif: 'Instrument Serif', Georgia, serif;
        }
    </style>
    <style>
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
        :focus-visible {
            outline: 2px solid #1f2d12;
            outline-offset: 2px;
            border-radius: 2px;
        }
        @media (prefers-color-scheme: dark) {
            :focus-visible { outline-color: #e2d6c0; }
        }
    </style>
</head>
<body class="bg-nrs-sand text-nrs-brown dark:bg-nrs-green dark:text-nrs-sand font-sans antialiased min-h-screen flex items-center justify-center px-6">
    <main class="text-center" role="main">
        <h1 class="font-serif text-5xl sm:text-6xl text-nrs-green dark:text-nrs-sand">404 &mdash; Page not found</h1>
        <p class="mt-4 text-lg text-nrs-brown/60 dark:text-nrs-sand/50">This page doesn't exist. It's not rocket science&thinsp;&mdash;&thinsp;it's just missing.</p>
        <a href="/" class="inline-block mt-8 px-6 py-3 bg-nrs-green dark:bg-nrs-sand text-nrs-sand dark:text-nrs-green rounded-lg font-medium hover:opacity-90 transition-opacity">
            Back to home
        </a>
    </main>
</body>
</html>
